name: C2C Job Scraper

on:
  schedule:
    # GitHub's cron minimum granularity is 5 min, but under load it can slip
    # by a few minutes — expect "near real-time," not exact.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py

      - name: Commit updated CSV and seen-ids file
        run: |
          git config user.name "job-scraper-bot"
          git config user.email "actions@github.com"
          git add data/jobs.csv data/seen_ids.json
          git diff --quiet --cached || git commit -m "Update job data [skip ci]"
          git push
